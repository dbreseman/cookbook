name: Build and Deploy Cookbook

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Install CookCLI
        run: |
            mkdir -p $HOME/.local/bin
            curl -L https://github.com/cooklang/cookcli/releases/latest/download/cook-x86_64-unknown-linux-musl.tar.gz | tar -xz -C $HOME/.local/bin
            chmod +x $HOME/.local/bin/cook

      - name: Build Web Static Site
        run: |
          $HOME/.local/bin/cook build web --output _site

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
